name: INO File Counter

# This triggers the workflow to run every time you push code to the main branch
on:
  push:
    branches:
      - main

jobs:
  count-files:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download a copy of your repository code onto the virtual machine
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Run the Python script to search and count the files
      - name: Count .ino files
        run: |
          python -c '
          import os
          count = sum(1 for root, dirs, files in os.walk(".") for f in files if f.endswith(".ino"))
          print("----------------------------------------")
          print(f"Total .ino files in repository: {count}")
          print("----------------------------------------")
          '
